<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My developer profile and links">
    <meta name="theme-color" content="#ffffff">
    <title>DevTree - My Links</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>
    <div id="app" class="container">
        <!-- Profile Section -->
        <section id="profile" class="profile-section">
            <div class="profile-content">
                <img id="avatar" class="avatar" src="assets/avatar.jpg" alt="Profile Avatar">
                <h1 id="name" class="profile-name">Your Name</h1>
                <p id="title" class="profile-title">Developer | Creator</p>
                <p id="bio" class="profile-bio">Your bio goes here</p>
            </div>
        </section>

        <!-- Links Section -->
        <section id="links" class="links-section">
            <div id="primary-links" class="link-group"></div>
            <div id="social-links" class="link-group social"></div>
            <div id="custom-links" class="link-group"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Made with <span class="heart">❤️</span> using DevTree Static</p>
        </footer>
    </div>

    <script src="src/js/main.js"></script>
</body>
</html>
